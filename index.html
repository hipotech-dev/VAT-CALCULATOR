<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockMaster.co.tz • VAT free tool + currency</title>
    <!-- Google Font & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 (free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            padding: 1rem;
        }

        /* Theme variables */
        :root {
            --bg-gradient-start: #eef2f9;
            --bg-gradient-end: #e0e7f2;
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-border: rgba(255,255,255,0.6);
            --text-primary: #0f293f;
            --text-secondary: #345d82;
            --text-muted: #43668a;
            --panel-bg: #ffffffd6;
            --panel-border: #ffffff;
            --input-bg: white;
            --input-border: #bed3ec;
            --button-bg: white;
            --button-border: #c1d4ec;
            --button-active-bg: #1e3c5c;
            --button-active-text: white;
            --result-card-bg: white;
            --shadow-color: rgba(0,30,60,0.4);
            --icon-color: #0b3b5c;
        }

        body.dark-theme {
            --bg-gradient-start: #1a2634;
            --bg-gradient-end: #0f1a24;
            --card-bg: rgba(25, 35, 45, 0.95);
            --card-border: #2a3a4a;
            --text-primary: #e3eef8;
            --text-secondary: #a6c1dd;
            --text-muted: #8ca3c0;
            --panel-bg: #1e2c3a;
            --panel-border: #314a60;
            --input-bg: #263542;
            --input-border: #405b74;
            --button-bg: #263542;
            --button-border: #405b74;
            --button-active-bg: #4f7aa6;
            --button-active-text: #ffffff;
            --result-card-bg: #1e2c3a;
            --shadow-color: rgba(0,0,0,0.6);
            --icon-color: #a6c1dd;
        }

        body.high-contrast {
            --bg-gradient-start: #000000;
            --bg-gradient-end: #1a1a1a;
            --card-bg: #000000;
            --card-border: #ffffff;
            --text-primary: #ffffff;
            --text-secondary: #ffff00;
            --text-muted: #ffffff;
            --panel-bg: #000000;
            --panel-border: #ffffff;
            --input-bg: #000000;
            --input-border: #ffff00;
            --button-bg: #000000;
            --button-border: #ffffff;
            --button-active-bg: #ffff00;
            --button-active-text: #000000;
            --result-card-bg: #000000;
            --shadow-color: rgba(255,255,255,0.3);
            --icon-color: #ffff00;
        }

        body {
            background: linear-gradient(165deg, var(--bg-gradient-start), var(--bg-gradient-end));
        }

        .card {
            max-width: 1000px;
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: 48px;
            box-shadow: 0 30px 60px -20px var(--shadow-color), 0 8px 20px -8px rgba(0,0,0,0.2), inset 0 1px 1px rgba(255,255,255,0.1);
            padding: 2rem;
            border: 1px solid var(--card-border);
        }

        /* header with title + language selector + theme toggle */
        .app-header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .title-section {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }
        .title-section i {
            font-size: 2.4rem;
            color: var(--icon-color);
            background: rgba(11,59,92,0.12);
            padding: 0.6rem;
            border-radius: 24px;
        }
        .title-section h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(145deg, var(--text-primary), var(--text-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.2;
        }
        .header-controls {
            display: flex;
            gap: 0.8rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .lang-selector {
            display: flex;
            gap: 0.5rem;
            background: var(--panel-bg);
            padding: 0.3rem;
            border-radius: 60px;
            border: 1px solid var(--input-border);
        }
        .lang-option {
            background: transparent;
            border: none;
            padding: 0.5rem 1.1rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .lang-option i {
            font-size: 1rem;
            color: var(--icon-color);
        }
        .lang-option.active {
            background: var(--button-active-bg);
            color: var(--button-active-text);
        }
        .theme-toggle {
            background: var(--panel-bg);
            border: 1px solid var(--input-border);
            border-radius: 60px;
            padding: 0.3rem;
            display: flex;
            gap: 0.3rem;
        }
        .theme-btn {
            background: transparent;
            border: none;
            padding: 0.5rem 0.8rem;
            border-radius: 40px;
            font-size: 1rem;
            color: var(--text-secondary);
            cursor: pointer;
        }
        .theme-btn.active {
            background: var(--button-active-bg);
            color: var(--button-active-text);
        }

        /* currency & rate panel */
        .currency-rate-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-bottom: 1.2rem;
            align-items: center;
            justify-content: space-between;
            background: var(--panel-bg);
            border-radius: 50px;
            padding: 0.4rem 0.4rem 0.4rem 1.5rem;
            border: 1px solid var(--panel-border);
        }
        .currency-picker {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex: 2 1 300px;
        }
        .currency-picker i {
            color: var(--icon-color);
            font-size: 1.3rem;
        }
        .currency-search {
            position: relative;
            flex: 1;
            min-width: 180px;
        }
        .currency-search input {
            width: 100%;
            padding: 0.7rem 1rem 0.7rem 2.4rem;
            border-radius: 40px;
            border: 1px solid var(--input-border);
            background: var(--input-bg);
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-primary);
            outline: none;
        }
        .currency-search i.fa-search {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
        }
        .currency-dropdown {
            position: absolute;
            top: 115%;
            left: 0;
            right: 0;
            background: var(--input-bg);
            border-radius: 24px;
            box-shadow: 0 20px 30px -12px var(--shadow-color);
            max-height: 210px;
            overflow-y: auto;
            z-index: 20;
            display: none;
            border: 1px solid var(--input-border);
        }
        .currency-dropdown.show {
            display: block;
        }
        .currency-item {
            padding: 0.7rem 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            cursor: pointer;
            border-bottom: 1px solid var(--input-border);
            color: var(--text-primary);
        }
        .currency-item:hover {
            background: var(--panel-bg);
        }
        .currency-item.selected {
            background: var(--button-active-bg);
            color: var(--button-active-text);
        }
        .currency-item .code {
            font-weight: 600;
            min-width: 50px;
        }

        .vat-rate-module {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: var(--panel-bg);
            padding: 0.3rem 1rem 0.3rem 1.5rem;
            border-radius: 60px;
        }
        .vat-rate-module .label {
            font-weight: 500;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        .rate-btns {
            display: flex;
            gap: 0.3rem;
        }
        .rate-btn {
            background: var(--button-bg);
            border: 1px solid var(--button-border);
            color: var(--text-secondary);
            font-weight: 600;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            cursor: pointer;
        }
        .rate-btn.active {
            background: var(--button-active-bg);
            border-color: var(--button-active-bg);
            color: var(--button-active-text);
        }
        .custom-rate {
            display: flex;
            align-items: center;
            background: var(--input-bg);
            border-radius: 60px;
            padding-left: 1rem;
            border: 1px solid var(--input-border);
        }
        .custom-rate input {
            width: 70px;
            padding: 0.4rem 0.2rem;
            border: none;
            background: transparent;
            font-weight: 600;
            color: var(--text-primary);
            outline: none;
            text-align: right;
        }
        .custom-rate span {
            padding-right: 0.8rem;
            color: var(--text-muted);
        }

        /* amount field - perfect decimal handling */
        .amount-container {
            background: var(--panel-bg);
            border-radius: 60px;
            padding: 0.3rem 1.8rem;
            margin: 1.2rem 0 0.8rem;
            border: 1px solid var(--panel-border);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .amount-prefix {
            font-size: 2rem;
            font-weight: 700;
            color: var(--icon-color);
            min-width: 65px;
        }
        .amount-container input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 1.2rem 0.2rem;
            font-size: 2.2rem;
            font-weight: 600;
            font-family: 'Inter', monospace;
            color: var(--text-primary);
            outline: none;
            width: 100%;
        }
        .amount-container input::placeholder {
            color: var(--text-muted);
            opacity: 0.6;
        }

        /* Currency converter row */
        .converter-row {
            background: var(--panel-bg);
            border-radius: 60px;
            padding: 0.9rem 1.5rem;
            margin: 1rem 0 1.5rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            border: 1px solid var(--panel-border);
        }
        .converter-title {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--icon-color);
            font-weight: 600;
        }
        .converter-controls {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.8rem;
        }
        .converter-controls select {
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 40px;
            padding: 0.6rem 1.5rem;
            font-weight: 500;
            color: var(--text-primary);
            outline: none;
            cursor: pointer;
        }
        .converter-controls input {
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 40px;
            padding: 0.6rem 1.2rem;
            width: 140px;
            font-weight: 500;
            color: var(--text-primary);
            outline: none;
        }
        .converter-controls button {
            background: var(--button-active-bg);
            border: none;
            color: var(--button-active-text);
            padding: 0.6rem 1.8rem;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
        }
        .converter-rate {
            font-size: 0.95rem;
            color: var(--text-secondary);
            background: var(--panel-bg);
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            border: 1px solid var(--input-border);
        }

        /* direction toggle */
        .direction-toggle {
            display: flex;
            gap: 0.5rem;
            background: var(--panel-bg);
            padding: 0.4rem;
            border-radius: 80px;
            margin: 1.2rem 0 1.5rem;
            border: 1px solid var(--input-border);
        }
        .direction-option {
            flex: 1;
            background: transparent;
            border: none;
            padding: 0.9rem;
            border-radius: 60px;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .direction-option.active {
            background: var(--button-active-bg);
            color: var(--button-active-text);
        }

        /* results cards */
        .results-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-top: 0.8rem;
        }
        .result-card {
            background: var(--result-card-bg);
            flex: 1 1 180px;
            border-radius: 36px;
            padding: 1.5rem 1rem;
            text-align: center;
            border: 1px solid var(--input-border);
        }
        .result-card .label {
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
        }
        .result-card .value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.3;
            word-break: break-word;
        }
        .result-card .sub {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* footer */
        .footer-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 2rem;
            color: var(--text-muted);
            border-top: 1px dashed var(--input-border);
            padding-top: 1.2rem;
        }
        .reset-btn {
            background: none;
            border: 1px solid var(--input-border);
            border-radius: 40px;
            padding: 0.5rem 1.8rem;
            color: var(--text-secondary);
            font-weight: 600;
            cursor: pointer;
        }
        .reset-btn:hover {
            background: var(--panel-bg);
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- header -->
        <div class="app-header">
            <div class="title-section">
                <i class="fas fa-calculator"></i>
                <h1>StockMaster.co.tz <span style="font-size: 0.8rem; background: var(--panel-bg); padding: 0.2rem 1rem; border-radius: 60px;">VAT free tool</span></h1>
            </div>
            <div class="header-controls">
                <div class="lang-selector">
                    <button class="lang-option" data-lang="en"><i class="fas fa-language"></i> EN</button>
                    <button class="lang-option active" data-lang="sw"><i class="fas fa-language"></i> SW</button>
                </div>
                <div class="theme-toggle">
                    <button class="theme-btn active" data-theme="light"><i class="fas fa-sun"></i></button>
                    <button class="theme-btn" data-theme="dark"><i class="fas fa-moon"></i></button>
                    <button class="theme-btn" data-theme="high-contrast"><i class="fas fa-circle-half-stroke"></i></button>
                </div>
            </div>
        </div>

        <!-- currency + VAT row -->
        <div class="currency-rate-row">
            <div class="currency-picker">
                <i class="fas fa-coins"></i>
                <div class="currency-search">
                    <i class="fas fa-search"></i>
                    <input type="text" id="currencySearch" placeholder="TZS, USD, EUR...">
                    <div class="currency-dropdown" id="currencyDropdown"></div>
                </div>
                <span id="selectedCurrencySymbol" style="font-weight:700;">TSh</span>
            </div>
            <div class="vat-rate-module">
                <span class="label"><i class="fas fa-percent"></i> <span id="vatLabel">VAT</span></span>
                <div class="rate-btns">
                    <button class="rate-btn" data-rate="0">0%</button>
                    <button class="rate-btn active" data-rate="18">18%</button>
                    <button class="rate-btn" data-rate="20">20%</button>
                </div>
                <div class="custom-rate">
                    <input type="number" id="customRateInput" step="0.1" min="0" max="100" value="18">
                    <span>%</span>
                </div>
            </div>
        </div>

        <!-- amount input - perfect decimal support -->
        <div class="amount-container">
            <span class="amount-prefix" id="currencyPrefix">TSh</span>
            <input type="text" id="amountInput" placeholder="0.00" value="1250.75" inputmode="decimal">
        </div>

        <!-- Currency converter panel -->
        <div class="converter-row">
            <div class="converter-title">
                <i class="fas fa-exchange-alt"></i> <span id="converterLabel">Currency Converter</span>
            </div>
            <div class="converter-controls">
                <select id="convertFrom">
                    <option value="TZS" selected>TZS</option>
                    <option value="USD">USD</option>
                    <option value="EUR">EUR</option>
                    <option value="GBP">GBP</option>
                    <option value="KES">KES</option>
                </select>
                <span>→</span>
                <select id="convertTo">
                    <option value="USD">USD</option>
                    <option value="TZS" selected>TZS</option>
                    <option value="EUR">EUR</option>
                    <option value="GBP">GBP</option>
                    <option value="KES">KES</option>
                </select>
                <input type="number" id="convertAmount" placeholder="Amount" value="1000" step="0.01">
                <button id="convertBtn"><i class="fas fa-sync-alt"></i> <span id="convertBtnLabel">Convert</span></button>
            </div>
            <div class="converter-rate" id="converterResult">= 2,750,000.00 TZS</div>
        </div>

        <!-- add/remove toggle -->
        <div class="direction-toggle">
            <button class="direction-option active" id="addVatBtn"><i class="fas fa-plus-circle"></i> <span id="addLabel">Add VAT</span></button>
            <button class="direction-option" id="removeVatBtn"><i class="fas fa-minus-circle"></i> <span id="removeLabel">Remove VAT</span></button>
        </div>

        <!-- result cards -->
        <div class="results-grid">
            <div class="result-card">
                <div class="label"><i class="fas fa-file-invoice"></i> <span id="netLabel">Net</span></div>
                <div class="value" id="netValue">TSh 1,250.75</div>
                <div class="sub" id="netSub">excl. VAT</div>
            </div>
            <div class="result-card">
                <div class="label"><i class="fas fa-plus-circle"></i> <span id="vatLabelResult">VAT</span></div>
                <div class="value" id="vatValue">TSh 225.14</div>
                <div class="sub" id="vatSub">18%</div>
            </div>
            <div class="result-card">
                <div class="label"><i class="fas fa-receipt"></i> <span id="grossLabel">Gross</span></div>
                <div class="value" id="grossValue">TSh 1,475.89</div>
                <div class="sub" id="grossSub">incl. VAT</div>
            </div>
        </div>

        <!-- footer -->
        <div class="footer-row">
            <span><i class="fas fa-chart-line"></i> <span id="footerText">live forex · supports cents</span></span>
            <button class="reset-btn" id="resetBtn"><i class="fas fa-undo-alt"></i> <span id="resetLabel">Reset all</span></button>
        </div>
    </div>

    <script>
        (function() {
            // Translations
            const translations = {
                en: {
                    vatLabel: "VAT",
                    addLabel: "Add VAT",
                    removeLabel: "Remove VAT",
                    netLabel: "Net",
                    vatLabelResult: "VAT",
                    grossLabel: "Gross",
                    netSub: "excl. VAT",
                    grossSub: "incl. VAT",
                    footerText: "live forex · supports cents",
                    resetLabel: "Reset all",
                    converterLabel: "Currency Converter",
                    convertBtnLabel: "Convert",
                },
                sw: {
                    vatLabel: "VAT",
                    addLabel: "Ongeza VAT",
                    removeLabel: "Toa VAT",
                    netLabel: "Net",
                    vatLabelResult: "VAT",
                    grossLabel: "Jumla",
                    netSub: "bila VAT",
                    grossSub: "pamoja na VAT",
                    footerText: "ubadilishaji halisi · inasaidia senti",
                    resetLabel: "Weka upya",
                    converterLabel: "Kibadilisha fedha",
                    convertBtnLabel: "Badilisha",
                }
            };

            // Currency data
            const currencies = [
                { code: "TZS", name: "Tanzanian Shilling", symbol: "TSh" },
                { code: "USD", name: "US Dollar", symbol: "$" },
                { code: "EUR", name: "Euro", symbol: "€" },
                { code: "GBP", name: "British Pound", symbol: "£" },
                { code: "KES", name: "Kenyan Shilling", symbol: "KSh" },
                { code: "UGX", name: "Ugandan Shilling", symbol: "USh" },
                { code: "RWF", name: "Rwandan Franc", symbol: "FRw" },
                { code: "ZAR", name: "South African Rand", symbol: "R" },
                { code: "CNY", name: "Chinese Yuan", symbol: "¥" },
                { code: "JPY", name: "Japanese Yen", symbol: "¥" },
                { code: "INR", name: "Indian Rupee", symbol: "₹" },
                { code: "BRL", name: "Brazilian Real", symbol: "R$" }
            ];

            // DOM elements
            const langEn = document.querySelector('.lang-option[data-lang="en"]');
            const langSw = document.querySelector('.lang-option[data-lang="sw"]');
            const themeBtns = document.querySelectorAll('.theme-btn');
            
            const vatLabelSpan = document.getElementById('vatLabel');
            const addLabelSpan = document.getElementById('addLabel');
            const removeLabelSpan = document.getElementById('removeLabel');
            const netLabelSpan = document.getElementById('netLabel');
            const vatLabelResultSpan = document.getElementById('vatLabelResult');
            const grossLabelSpan = document.getElementById('grossLabel');
            const netSubSpan = document.getElementById('netSub');
            const grossSubSpan = document.getElementById('grossSub');
            const footerTextSpan = document.getElementById('footerText');
            const resetLabelSpan = document.getElementById('resetLabel');
            const converterLabelSpan = document.getElementById('converterLabel');
            const convertBtnLabelSpan = document.getElementById('convertBtnLabel');
            const currencySearchInput = document.getElementById('currencySearch');
            const selectedSymbolSpan = document.getElementById('selectedCurrencySymbol');
            const currencyPrefix = document.getElementById('currencyPrefix');
            const currencyDropdown = document.getElementById('currencyDropdown');
            const rateBtns = document.querySelectorAll('.rate-btn');
            const customRateInput = document.getElementById('customRateInput');
            const amountInput = document.getElementById('amountInput');
            const addVatBtn = document.getElementById('addVatBtn');
            const removeVatBtn = document.getElementById('removeVatBtn');
            const resetBtn = document.getElementById('resetBtn');
            const netValueSpan = document.getElementById('netValue');
            const vatValueSpan = document.getElementById('vatValue');
            const grossValueSpan = document.getElementById('grossValue');
            const vatSubSpan = document.getElementById('vatSub');
            const convertFrom = document.getElementById('convertFrom');
            const convertTo = document.getElementById('convertTo');
            const convertAmount = document.getElementById('convertAmount');
            const convertBtn = document.getElementById('convertBtn');
            const converterResult = document.getElementById('converterResult');

            // State
            let currentLang = 'sw';
            let currentCurrency = { code: 'TZS', name: 'Tanzanian Shilling', symbol: 'TSh' };
            let currentMode = 'add';
            let exchangeRates = {
                TZS: 1, USD: 0.0004, EUR: 0.00037, GBP: 0.00031, KES: 0.052, 
                UGX: 1.52, RWF: 0.51, ZAR: 0.0075, CNY: 0.0029, JPY: 0.059, INR: 0.033, BRL: 0.0021
            };

            // Theme handling
            function setTheme(theme) {
                document.body.className = '';
                if (theme === 'dark') document.body.classList.add('dark-theme');
                if (theme === 'high-contrast') document.body.classList.add('high-contrast');
                
                themeBtns.forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.theme === theme);
                });
            }

            themeBtns.forEach(btn => {
                btn.addEventListener('click', () => setTheme(btn.dataset.theme));
            });

            // Language
            function applyLanguage(lang) {
                const t = translations[lang];
                vatLabelSpan.innerText = t.vatLabel;
                addLabelSpan.innerText = t.addLabel;
                removeLabelSpan.innerText = t.removeLabel;
                netLabelSpan.innerText = t.netLabel;
                vatLabelResultSpan.innerText = t.vatLabelResult;
                grossLabelSpan.innerText = t.grossLabel;
                netSubSpan.innerText = t.netSub;
                grossSubSpan.innerText = t.grossSub;
                footerTextSpan.innerText = t.footerText;
                resetLabelSpan.innerText = t.resetLabel;
                converterLabelSpan.innerText = t.converterLabel;
                convertBtnLabelSpan.innerText = t.convertBtnLabel;
                
                langEn.classList.toggle('active', lang === 'en');
                langSw.classList.toggle('active', lang === 'sw');
            }

            langEn.addEventListener('click', () => { currentLang = 'en'; applyLanguage('en'); });
            langSw.addEventListener('click', () => { currentLang = 'sw'; applyLanguage('sw'); });

            // Currency dropdown
            function renderCurrencyDropdown(filter = '') {
                const filtered = currencies.filter(c => 
                    c.code.toLowerCase().includes(filter.toLowerCase()) || 
                    c.name.toLowerCase().includes(filter.toLowerCase())
                );
                
                currencyDropdown.innerHTML = filtered.map(curr => `
                    <div class="currency-item ${curr.code === currentCurrency.code ? 'selected' : ''}" 
                         data-code="${curr.code}" data-symbol="${curr.symbol}">
                        <span class="code">${curr.code}</span>
                        <span class="name">${curr.name}</span>
                    </div>
                `).join('');
                
                currencyDropdown.classList.toggle('show', filtered.length > 0);

                document.querySelectorAll('.currency-item').forEach(item => {
                    item.addEventListener('click', () => {
                        currentCurrency = {
                            code: item.dataset.code,
                            symbol: item.dataset.symbol,
                            name: item.querySelector('.name').innerText
                        };
                        selectedSymbolSpan.innerText = currentCurrency.symbol;
                        currencyPrefix.innerText = currentCurrency.symbol;
                        currencySearchInput.value = '';
                        currencyDropdown.classList.remove('show');
                        updateAll();
                    });
                });
            }

            document.addEventListener('click', (e) => {
                if (!e.target.closest('.currency-picker')) {
                    currencyDropdown.classList.remove('show');
                }
            });

            currencySearchInput.addEventListener('input', (e) => renderCurrencyDropdown(e.target.value));
            currencySearchInput.addEventListener('focus', () => renderCurrencyDropdown(currencySearchInput.value));

            // Number formatting with proper decimals
            function formatMoney(value, symbol = '') {
                let num = parseFloat(value);
                if (isNaN(num)) num = 0;
                // Always show 2 decimal places for cents
                let parts = num.toFixed(2).split('.');
                parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
                return symbol + ' ' + parts.join('.');
            }

            function parseAmount(str) {
                if (!str || str.trim() === '') return 0;
                // Remove any non-numeric characters except decimal point and minus
                let cleaned = str.replace(/[^\d.-]/g, '');
                let val = parseFloat(cleaned);
                return isNaN(val) ? 0 : val;
            }

            // Main update function
            function updateAll() {
                // Parse amount with decimal support
                let rawAmount = parseAmount(amountInput.value);
                if (rawAmount < 0) rawAmount = 0;
                amountInput.value = rawAmount || '';

                // Get VAT rate
                let vatRate = parseFloat(customRateInput.value);
                if (isNaN(vatRate) || vatRate < 0) vatRate = 0;
                if (vatRate > 100) vatRate = 100;
                customRateInput.value = vatRate;

                // Update rate buttons
                rateBtns.forEach(btn => {
                    let btnRate = parseFloat(btn.dataset.rate);
                    btn.classList.toggle('active', Math.abs(btnRate - vatRate) < 0.0001);
                });

                vatSubSpan.innerText = vatRate.toFixed(1) + '%';

                // Calculate VAT
                let net, vat, gross;
                if (currentMode === 'add') {
                    net = rawAmount;
                    vat = net * vatRate / 100;
                    gross = net + vat;
                } else {
                    gross = rawAmount;
                    if (vatRate === 0) {
                        net = gross;
                        vat = 0;
                    } else {
                        net = gross / (1 + vatRate / 100);
                        vat = gross - net;
                    }
                }

                // Update displays with 2 decimal places
                netValueSpan.innerText = formatMoney(net, currentCurrency.symbol);
                vatValueSpan.innerText = formatMoney(vat, currentCurrency.symbol);
                grossValueSpan.innerText = formatMoney(gross, currentCurrency.symbol);
            }

            // Currency conversion
            async function fetchLiveRates() {
                try {
                    const response = await fetch('https://api.frankfurter.app/latest?from=USD');
                    const data = await response.json();
                    if (data.rates) {
                        exchangeRates = {
                            ...exchangeRates,
                            USD: 1,
                            EUR: data.rates.EUR || 0.93,
                            GBP: data.rates.GBP || 0.79,
                            TZS: 2500,
                            KES: 130,
                            UGX: 3700,
                            RWF: 1280,
                            ZAR: 18.5,
                            CNY: 7.2,
                            JPY: 150,
                            INR: 83,
                            BRL: 5.05
                        };
                    }
                } catch (error) {
                    console.warn("Using fallback rates");
                }
            }

            function convertCurrency() {
                let from = convertFrom.value;
                let to = convertTo.value;
                let amount = parseFloat(convertAmount.value) || 0;
                
                let tzsValue = amount / exchangeRates[from];
                let result = tzsValue * exchangeRates[to];
                
                converterResult.innerText = `= ${formatMoney(result, '')} ${to}`;
            }

            // Event listeners
            rateBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    customRateInput.value = parseFloat(btn.dataset.rate);
                    updateAll();
                });
            });

            customRateInput.addEventListener('input', updateAll);
            amountInput.addEventListener('input', updateAll);

            addVatBtn.addEventListener('click', () => {
                currentMode = 'add';
                addVatBtn.classList.add('active');
                removeVatBtn.classList.remove('active');
                updateAll();
            });

            removeVatBtn.addEventListener('click', () => {
                currentMode = 'remove';
                removeVatBtn.classList.add('active');
                addVatBtn.classList.remove('active');
                updateAll();
            });

            resetBtn.addEventListener('click', () => {
                amountInput.value = '1250.75';
                currentMode = 'add';
                addVatBtn.classList.add('active');
                removeVatBtn.classList.remove('active');
                customRateInput.value = 18;
                currentCurrency = { code: 'TZS', name: 'Tanzanian Shilling', symbol: 'TSh' };
                selectedSymbolSpan.innerText = 'TSh';
                currencyPrefix.innerText = 'TSh';
                convertFrom.value = 'TZS';
                convertTo.value = 'USD';
                convertAmount.value = 1000;
                fetchLiveRates().then(() => convertCurrency());
                updateAll();
            });

            convertBtn.addEventListener('click', convertCurrency);
            convertAmount.addEventListener('input', convertCurrency);
            convertFrom.addEventListener('change', convertCurrency);
            convertTo.addEventListener('change', convertCurrency);

            // Initialize
            renderCurrencyDropdown('');
            selectedSymbolSpan.innerText = currentCurrency.symbol;
            currencyPrefix.innerText = currentCurrency.symbol;
            applyLanguage('sw');
            fetchLiveRates().then(() => convertCurrency());
            updateAll();

            // Ensure decimal precision on blur
            amountInput.addEventListener('blur', () => {
                let v = parseAmount(amountInput.value);
                amountInput.value = v ? v.toFixed(2) : '';
                updateAll();
            });
        })();
    </script>
</body>
</html>
